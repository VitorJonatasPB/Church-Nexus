{% extends "admin/change_form.html" %}

{% block extrahead %}
{{ block.super }}
<script type="text/javascript">
function abrirAbaDoHash() {
    const hash = window.location.hash;
    if (hash) {
        const tabLink = document.querySelector('.nav-link[href="' + hash + '"]');
        if (tabLink) {
            $(tabLink).tab('show');  // Jazzmin/Bootstrap
        }
    }
}

// Abre a aba ao carregar a página
document.addEventListener("DOMContentLoaded", abrirAbaDoHash);

// Abre a aba se o hash mudar sem recarregar a página
window.addEventListener("hashchange", abrirAbaDoHash);
</script>
{% endblock %}

{% block object-tools-items %}
  {{ block.super }}
  {% if original %}
    <li>
      <div class="dropdown" style="display:inline-block; margin-left: 5px;">
        <button class="btn btn-info dropdown-toggle" type="button" id="exportDropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
          <i class="fas fa-file-export"></i> Exportar
        </button>
        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="exportDropdown">
          <a class="dropdown-item" href="{% url 'admin:eventos_evento_export_pdf' object_id=original.pk %}">
            <i class="fas fa-file-pdf text-danger"></i> PDF
          </a>
          <a class="dropdown-item" href="{% url 'admin:eventos_evento_export_excel' object_id=original.pk %}">
            <i class="fas fa-file-csv text-success"></i> CSV
          </a>
        </div>
      </div>
    </li>
  {% endif %}
{% endblock %}
