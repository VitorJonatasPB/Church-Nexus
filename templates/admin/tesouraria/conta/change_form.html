{% extends "admin/change_form.html" %}

{% block object-tools-items %}
  {{ block.super }}
  {% if original %}
    <li>
      <div class="dropdown" style="display:inline-block; margin-left: 5px;">
        <button class="btn btn-info dropdown-toggle" type="button" id="exportDropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
          <i class="fas fa-file-export"></i> Extrato
        </button>
        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="exportDropdown">
          <a class="dropdown-item" href="{% url 'admin:tesouraria_conta_export_pdf' object_id=original.pk %}">
            <i class="fas fa-file-pdf text-danger"></i> PDF
          </a>
          <a class="dropdown-item" href="{% url 'admin:tesouraria_conta_export_excel' object_id=original.pk %}">
            <i class="fas fa-file-csv text-success"></i> CSV
          </a>
        </div>
      </div>
    </li>
  {% endif %}
{% endblock %}
