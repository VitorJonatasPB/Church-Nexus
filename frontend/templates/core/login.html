{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Church Nexus</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Decoration element */
        .decoration {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #0dcaf0, #0d6efd);
            filter: blur(60px);
            z-index: -1;
            opacity: 0.5;
        }
        .decoration-1 { top: -100px; right: -100px; width: 400px; height: 400px; }
        .decoration-2 { bottom: -150px; left: -100px; width: 500px; height: 500px; background: linear-gradient(135deg, #20c997, #198754); }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            color: #fff;
            position: relative;
            z-index: 10;
        }
        
        .login-title {
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            color: #ffffff;
            font-size: 1.8rem;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 12px;
            padding: 0.9rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0dcaf0;
            color: #fff;
            box-shadow: 0 0 15px rgba(13, 202, 240, 0.3);
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .input-group-text {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-right: none;
            color: #0dcaf0;
            border-radius: 12px 0 0 12px;
        }
        
        .form-control.with-icon {
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding-left: 0;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0dcaf0, #0d6efd);
            border: none;
            color: #fff;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.4);
        }
        
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.5rem;
        }
        
        .alert-error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #ffcccc;
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(5px);
        }
        
    </style>
</head>
<body>
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    
    <div class="login-card">
        <div class="text-center mb-3">
            <i class="fas fa-church fa-3x" style="color: #0dcaf0; filter: drop-shadow(0 0 10px rgba(13,202,240,0.5));"></i>
        </div>
        <h3 class="text-center login-title">Church Nexus</h3>
        
        {% if form.errors %}
            <div class="alert-error text-center">
                <i class="fas fa-exclamation-triangle me-2"></i> Usuário ou senha inválidos. Tente novamente.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control with-icon" placeholder="Digite seu usuário" required autofocus autocomplete="username">
                </div>
            </div>
            <div class="mb-5">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control with-icon" placeholder="Digite sua senha" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                ENTRAR <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>
    </div>
</body>
</html>
